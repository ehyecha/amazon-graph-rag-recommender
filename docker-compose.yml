version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.1
  environment:
  # 초기 사용자 정보를 환경 변수로 세팅
    _AIRFLOW_DB_MIGRATE: 'true' # DB 테이블 생성 명령
    _AIRFLOW_WWW_USER_CREATE: 'true'
    _AIRFLOW_WWW_USER_USERNAME: 'admin'      
    _AIRFLOW_WWW_USER_PASSWORD: 'admin'     
    _AIRFLOW_WWW_USER_ROLE: 'Admin'
    _AIRFLOW_WWW_USER_FIRSTNAME: 'Airflow'
    _AIRFLOW_WWW_USER_LASTNAME: 'Admin'
    _AIRFLOW_WWW_USER_EMAIL: 'admin@example.com'
    _PIP_ADDITIONAL_DEPENDENCIES: "kafka-python pandas neo4j"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: ''
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - data-network

services:
  # 1. Database: Postgres (for Airflow Metadata)
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    networks:
      - data-network
    volumes:
      - postgres_data:/var/lib/postgresql/data  # <--- 이 줄을 추가!
  # 2. Broker: Redis (for Airflow Celery)
  redis:
    image: redis:latest
    networks:
      - data-network
  
  # 3. Airflow Init 서비스 추가
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    # 이 명령어는 DB 구조를 만들고 버전을 출력한 뒤 스스로 종료됩니다.
    command: version
    depends_on:
      - postgres
      - redis
    
  # 4. Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  # 5. Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - postgres
      - redis

  # 6. Kafka (KRaft mode, No Zookeeper)
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data-network

  # 7. Graph Database: Neo4j
  neo4j:
    image: neo4j:5.12.0
    container_name: neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/airflow123
      - NEO4J_PLUGINS=["apoc"] # 시니어를 위한 APOC 플러그인 미리 활성화
    volumes:
      - ./neo4j_data:/data
    networks:
      - data-network

networks:
  data-network:
    driver: bridge

volumes:
  postgres_data:
